name: Submit Resource

on:
  issues:
    types: [opened]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue 编号(用于手动重试已开过的 Issue)"
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: submit-resource-${{ github.event.issue.number || github.event.inputs.issue_number }}
  cancel-in-progress: false

jobs:
  process:
    name: 处理提交并开 PR
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.action == 'opened')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 设置 bot 身份
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: 处理 Issue 并生成资源文件
        id: process
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.inputs.issue_number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_HTML_URL: ${{ github.event.issue.html_url }}
        run: node .github/scripts/process-submission.js

      - name: 创建 PR
        uses: peter-evans/create-pull-request@v6
        with:
          branch: submission/issue-${{ github.event.issue.number || github.event.inputs.issue_number }}
          add-paths: |
            Skill
            Plugin
            Workflow
            Template
            README.md
            README.en.md
          commit-message: "chore(submission): 收录 issue #${{ github.event.issue.number || github.event.inputs.issue_number }}"
          title: "收录: ${{ steps.process.outputs.repo }} (${{ steps.process.outputs.types }})"
          body: |
            Closes #${{ github.event.issue.number || github.event.inputs.issue_number }}

            ### 收录摘要

            - **仓库**: [${{ steps.process.outputs.repo }}](https://github.com/${{ steps.process.outputs.repo }})
            - **类型**: ${{ steps.process.outputs.types }}
            - **提交人**: @${{ github.event.issue.user.login }}
            - **原 Issue**: #${{ github.event.issue.number || github.event.inputs.issue_number }}

            ${{ steps.process.outputs.duplicate_note }}

            ### 资源链接

            ${{ steps.process.outputs.links }}

            ### 描述

            ${{ steps.process.outputs.description }}

            ---
            此 PR 由 GitHub Actions 自动创建,合入后将自动关闭对应 Issue。
          delete-branch: true
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
