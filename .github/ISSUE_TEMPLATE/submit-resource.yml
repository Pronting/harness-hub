name: 提交开源 Harness 资源
description: 提交一个开源 Skill / Plugin / Workflow / Template,由 Action 自动创建收录 PR。
title: "[Submit] "
labels:
  - submission
  - triage
body:
  - type: markdown
    attributes:
      value: |
        欢迎提交开源 Harness 资源!请填写下方字段,提交后机器人会自动开 PR。
        仓库必须为 **GitHub 公共仓库**。

  - type: input
    id: repo_url
    attributes:
      label: 仓库 URL(必填)
      description: GitHub 仓库地址,例如 https://github.com/anthropics/skills
      placeholder: https://github.com/<owner>/<repo>
    validations:
      required: true

  - type: checkboxes
    id: resource_types
    attributes:
      label: 资源类型(多选,至少一项)
      description: 该仓库属于哪几类 Harness 资源?
      options:
        - label: Skill
        - label: Plugin
        - label: Workflow
        - label: Template
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 简短描述(中文,必填)
      description: 1-3 句话,说明这个资源解决什么问题、适合什么场景。
      placeholder: 例如:一个轻量级的本地 Agent Skill,提供离线 RAG 检索能力。
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: 标签 / 关键词(可选,逗号分隔)
      description: 例如:ai, agent, rag, eval;最多 10 个。
      placeholder: ai, agent, rag
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ## 提交后会发生什么

        1. GitHub Actions 自动解析本 Issue,调用 GitHub API 拉取仓库元数据。
        2. 自动创建分支 `submission/issue-<编号>`,在对应类型目录下生成 `README.md` 与 `metadata.json`。
        3. 自动开一个 PR,标题形如 `收录: <owner>/<repo> (Skill)`。
        4. 维护者人工审核后合入,合入时 PR body 中的 `Closes #<编号>` 会自动关闭本 Issue。
        5. README(中英双版本)的"收录列表"区由 Action 在 PR 中自动重新生成。
